<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="삼성전자 강남구 - 메트릭스 스타일 프로페셔널 웹사이트">
    <title>삼성전자 강남구 | Matrix Profile</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#home" aria-label="홈으로 이동">// PROFILE</a>
      <nav aria-label="주요 메뉴">
        <a href="#profile">Profile</a>
        <a href="#games">Games</a>
      </nav>
    </header>

    <main>
      <section id="home" class="hero" aria-labelledby="hero-title">
        <p class="eyebrow">SYSTEM ONLINE // 001</p>
        <h1 id="hero-title">삼성전자 강남구</h1>
        <p class="hero-copy">디지털 신호 속에서 다음 연결을 탐색합니다.</p>
        <a class="cta" href="#games">Enter Games <span aria-hidden="true">→</span></a>
      </section>

      <section id="profile" class="profile" aria-labelledby="profile-title">
        <div class="profile-image-wrap">
          <img src="profile-wrecking-ball-concept.png" alt="밝은 메트릭스풍의 귀여운 구형 로봇 프로필 이미지">
        </div>
        <div>
          <p class="eyebrow">IDENTITY // VERIFIED</p>
          <h2 id="profile-title">삼성전자 강남구</h2>
        </div>
      </section>

      <section id="games" class="games" aria-labelledby="games-title">
        <p class="eyebrow">GAMES // LOADING</p>
        <h2 id="games-title">Worm Protocol</h2>
        <p>키보드와 모바일 터치로 즐기는 지렁이 게임을 준비 중입니다.</p>
        <div class="game-placeholder" aria-label="게임 준비 영역">GAME AREA // READY</div>
      </section>
    </main>

    <footer class="site-footer">&copy; <span id="year"></span> // END OF SIGNAL</footer>
  </body>
</html>
